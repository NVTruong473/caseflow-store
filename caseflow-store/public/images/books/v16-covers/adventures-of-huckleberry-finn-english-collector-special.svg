<svg xmlns="http://www.w3.org/2000/svg" width="480" height="720" viewBox="0 0 480 720" role="img" aria-label="Adventures of Huckleberry Finn - Collector's Edition cover">
  <title>Adventures of Huckleberry Finn - Collector's Edition cover</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ribbon { font: 800 22px Inter, Arial, sans-serif; letter-spacing: 1px; }
      .title { font: 800 34px Georgia, 'Times New Roman', serif; fill: #2F2A18; }
      .initials { font: 900 82px Inter, Arial, sans-serif; letter-spacing: 2px; }
      .meta { font: 700 20px Inter, Arial, sans-serif; fill: #2F2A18; }
      .brand { font: 700 16px Inter, Arial, sans-serif; letter-spacing: 2px; }
    </style>
  </defs>
  <rect width="480" height="720" fill="#6A5D2F"/>
  <rect x="30" y="30" width="420" height="660" rx="26" fill="#F1ECD8" filter="url(#shadow)"/>
  <rect x="30" y="30" width="420" height="136" rx="26" fill="#6A5D2F"/>
  <rect x="30" y="118" width="420" height="48" fill="#6A5D2F"/>
  <rect x="58" y="74" width="364" height="46" rx="23" fill="#fffdf8" opacity="0.96"/>
  <text x="240" y="105" text-anchor="middle" class="ribbon" fill="#6A5D2F">ENGLISH BOOK</text>
  <circle cx="240" cy="304" r="94" fill="#fffdf8" stroke="#6A5D2F" stroke-width="10"/>
  <text x="240" y="334" text-anchor="middle" class="initials" fill="#6A5D2F">AH</text>
  <g>
    <text x="240" y="210" text-anchor="middle" class="title">Adventures of</text><text x="240" y="248" text-anchor="middle" class="title">Huckleberry Finn</text>
  </g>
  <rect x="96" y="420" width="288" height="3" fill="#6A5D2F"/>
  <text x="240" y="476" text-anchor="middle" class="meta">Collector's Edition</text>
  <text x="240" y="512" text-anchor="middle" class="meta">Special edition</text>
  <rect x="74" y="568" width="332" height="54" rx="12" fill="#fffdf8" stroke="#6A5D2F" stroke-width="3"/>
  <text x="240" y="603" text-anchor="middle" class="brand" fill="#6A5D2F">CASEFLOW BOOKS</text>
  <rect x="70" y="640" width="340" height="8" rx="4" fill="#6A5D2F"/>
</svg>
